  - {type: variant, offset: 5788, length: 48, content: 摩訶羅陀，此翻大無罪。《文殊問經》云「羅陀翻為中」。摩訶波那羅，或云此翻大度知本未詳作本文未詳【大】，未詳【知】未詳未詳。摩訶提婆，此言大天。摩訶薩埵，此翻大心, 乙: 二游行三各述相四見產虎五各陳觀見}
