  - {type: variant, offset: 5836, length: 16, content: 二游行。三各述相。四見產虎。五各陳觀〔見〕－【知】見【大】，〔－〕【知】見, 乙: 摩訶羅陀此翻大無罪文殊問經云羅陀翻為中摩訶波那羅或云此翻大度未詳摩訶提婆此言大天摩訶薩埵此翻大心}
